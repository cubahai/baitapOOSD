<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khai báo Sinh Viên</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 600px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="date"]:focus,
        select:focus,
        textarea:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            outline: none;
        }

        select {
            cursor: pointer;
            background-color: white;
        }

        .error-message {
            color: #dc3545;
            font-size: 12px;
            margin-top: 5px;
            display: block;
        }

        .form-group.has-error input,
        .form-group.has-error select,
        .form-group.has-error textarea {
            border-color: #dc3545;
            background-color: #fff5f5;
        }

        .alert {
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 5px;
            font-size: 14px;
        }

        .alert-danger {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button,
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn-submit {
            background-color: #667eea;
            color: white;
        }

        .btn-submit:hover {
            background-color: #5568d3;
        }

        .btn-reset {
            background-color: #6c757d;
            color: white;
        }

        .btn-reset:hover {
            background-color: #5a6268;
        }

        .required {
            color: #dc3545;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Khai báo Sinh Viên</h1>

        <!-- Hiển thị lỗi nếu có -->
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/sinh-vien/luu-thong-tin}" th:object="${sinhVienForm}" method="post" novalidate>

            <!-- Số CMND/CCCD -->
            <div class="form-group" th:classappend="${#fields.hasErrors('soCMND')} ? 'has-error' : ''">
                <label for="soCMND">Số CMND/CCCD <span class="required">*</span></label>
                <input type="text" id="soCMND" th:field="*{soCMND}" placeholder="Nhập số CMND/CCCD">
                <span class="error-message" th:if="${#fields.hasErrors('soCMND')}" th:errors="*{soCMND}"></span>
            </div>

            <!-- Họ Tên -->
            <div class="form-group" th:classappend="${#fields.hasErrors('hoTen')} ? 'has-error' : ''">
                <label for="hoTen">Họ Tên <span class="required">*</span></label>
                <input type="text" id="hoTen" th:field="*{hoTen}" placeholder="Nhập họ và tên">
                <span class="error-message" th:if="${#fields.hasErrors('hoTen')}" th:errors="*{hoTen}"></span>
            </div>

            <!-- Địa Chỉ -->
            <div class="form-group" th:classappend="${#fields.hasErrors('diaChi')} ? 'has-error' : ''">
                <label for="diaChi">Địa Chỉ <span class="required">*</span></label>
                <textarea id="diaChi" th:field="*{diaChi}" placeholder="Nhập địa chỉ"></textarea>
                <span class="error-message" th:if="${#fields.hasErrors('diaChi')}" th:errors="*{diaChi}"></span>
            </div>

            <!-- Email -->
            <div class="form-group" th:classappend="${#fields.hasErrors('email')} ? 'has-error' : ''">
                <label for="email">Email <span class="required">*</span></label>
                <input type="email" id="email" th:field="*{email}" placeholder="Nhập email">
                <span class="error-message" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
            </div>

            <!-- Số Điện Thoại -->
            <div class="form-group" th:classappend="${#fields.hasErrors('soDT')} ? 'has-error' : ''">
                <label for="soDT">Số Điện Thoại <span class="required">*</span></label>
                <input type="text" id="soDT" th:field="*{soDT}" placeholder="Nhập số điện thoại (10-11 chữ số)">
                <span class="error-message" th:if="${#fields.hasErrors('soDT')}" th:errors="*{soDT}"></span>
            </div>

            <!-- Trường Tốt Nghiệp -->
            <div class="form-group" th:classappend="${#fields.hasErrors('maTruong')} ? 'has-error' : ''">
                <label for="maTruong">Trường Tốt Nghiệp <span class="required">*</span></label>
                <select id="maTruong" th:field="*{maTruong}">
                    <option value="">-- Chọn trường --</option>
                    <option th:each="t : ${dsTruong}" th:value="${t.maTruong}" th:text="${t.tenTruong}"></option>
                </select>
                <span class="error-message" th:if="${#fields.hasErrors('maTruong')}" th:errors="*{maTruong}"></span>
            </div>

            <!-- Ngành Tốt Nghiệp -->
            <div class="form-group" th:classappend="${#fields.hasErrors('maNganh')} ? 'has-error' : ''">
                <label for="maNganh">Ngành Tốt Nghiệp <span class="required">*</span></label>
                <select id="maNganh" th:field="*{maNganh}">
                    <option value="">-- Chọn ngành --</option>
                    <option th:each="n : ${dsNganh}" th:value="${n.maNganh}" th:text="${n.tenNganh}"></option>
                </select>
                <span class="error-message" th:if="${#fields.hasErrors('maNganh')}" th:errors="*{maNganh}"></span>
            </div>

            <!-- Ngày Tốt Nghiệp -->
            <div class="form-group" th:classappend="${#fields.hasErrors('ngayTN')} ? 'has-error' : ''">
                <label for="ngayTN">Ngày Tốt Nghiệp <span class="required">*</span></label>
                <input type="date" id="ngayTN" th:field="*{ngayTN}">
                <span class="error-message" th:if="${#fields.hasErrors('ngayTN')}" th:errors="*{ngayTN}"></span>
            </div>

            <!-- Nút Bấm -->
            <div class="button-group">
                <button type="submit" class="btn-submit">✓ Lưu Thông Tin</button>
                <button type="reset" class="btn-reset">↺ Xóa Form</button>
            </div>
        </form>
    </div>
</body>
</html>
